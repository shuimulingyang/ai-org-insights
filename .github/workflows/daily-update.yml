name: Daily Article Update

on:
  schedule:
    # 每天 UTC 00:07 = 北京时间 08:07
    - cron: '7 0 * * *'
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 需要写权限才能 push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run article update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_articles.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          # 只有 data.js 真正变化时才 commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily article update $(date +'%Y-%m-%d')"
            git push
          fi
